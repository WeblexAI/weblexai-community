name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-alpine3.22
        env:
          POSTGRES_DB: weblex_test
          POSTGRES_USER: weblex
          POSTGRES_PASSWORD: test-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U weblex -d weblex_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.0.2-alpine3.21
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, curl, exif, gd, intl, mbstring, pcntl, pdo_pgsql, redis, sodium, zip
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: vendor/bin/pint --test
      - run: composer analyse
      - run: php artisan test
        env:
          APP_INSTALLED: "true"
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: weblex_test
          DB_USERNAME: weblex
          DB_PASSWORD: test-password
          CACHE_STORE: redis
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          REDIS_HOST: 127.0.0.1
      - run: composer audit --locked
      - run: composer licenses --format=json > composer-licenses.json

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run test:sdk
      - run: npm run build
      - run: npm audit --audit-level=high
      - run: npm ls --all --json > npm-dependencies.json

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/weblexai-community" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.image.outputs.name }}:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          ls -l tests/e2e || true
          file tests/e2e/run.sh || true
          sed -n '1,200p' tests/e2e/run.sh || true
          chmod +x tests/e2e/run.sh
          bash -x tests/e2e/run.sh
