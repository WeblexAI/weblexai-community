name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: composer install --no-dev --prefer-dist --classmap-authoritative
      - run: npm ci && npm run build
      - run: tar --exclude=.git --exclude=node_modules --exclude=vendor --exclude=storage/logs --exclude=tests/e2e/*.runtime* -czf "weblexai-community-${GITHUB_REF_NAME#v}.tar.gz" .
      - run: sha256sum weblexai-community-*.tar.gz > SHA256SUMS
      - name: Sign release manifest
        env:
          RELEASE_PRIVATE_KEY: ${{ secrets.RELEASE_PRIVATE_KEY }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          artifact="weblexai-community-${version}.tar.gz"
          sha="$(cut -d' ' -f1 SHA256SUMS)"
          php scripts/sign-release-manifest.php \
            --version="$version" \
            --artifact-url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${artifact}" \
            --sha256="$sha" \
            --notes-url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            --output=stable.json
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            weblexai-community-*.tar.gz
            SHA256SUMS
            stable.json
            docker-compose.yml
            scripts/backup-docker.sh
            scripts/restore-docker.sh

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/weblexai-community" >> "$GITHUB_OUTPUT"
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=raw,value=stable
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-agent-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/weblexai-community-update-agent" >> "$GITHUB_OUTPUT"
      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=raw,value=stable
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/update-agent/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-public-images:
    needs: [image, update-agent-image]
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          docker pull "ghcr.io/${owner}/weblexai-community:stable"
          docker pull "ghcr.io/${owner}/weblexai-community-update-agent:stable"
